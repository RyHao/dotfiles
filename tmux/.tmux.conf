# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Functional plugins (installed incrementally)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# Auto-restore the last-saved tmux environment when the server starts
set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'roosta/tmux-fuzzback'
set -g @plugin 'rickstaa/tmux-notify'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

set -g @plugin 'janoamaral/tokyo-night-tmux'

# --- Tokyo Night theme config (self-contained; set before the tpm run line) ---
set -g @tokyo-night-tmux_theme night          # night | storm | day
set -g @tokyo-night-tmux_transparent 0         # 0 = solid theme bg, 1 = transparent
set -g @tokyo-night-tmux_window_id_style digital
set -g @tokyo-night-tmux_pane_id_style hsquare
# Widgets
set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_date_format YMD       # YYYY-MM-DD
set -g @tokyo-night-tmux_time_format 24H
set -g @tokyo-night-tmux_show_battery_widget 1
set -g @tokyo-night-tmux_show_git 1

# macOS: prepend GNU coreutils/sed to PATH for plugin scripts.
# tokyo-night-tmux's git widget calls `stat -c` (GNU-only); without GNU stat it
# fails silently and re-runs `git fetch` on every status refresh. run-shell expands
# $PATH via /bin/sh, so this prepends without clobbering mise/node/etc.
run-shell 'tmux set-environment -g PATH "/opt/homebrew/opt/coreutils/libexec/gnubin:/opt/homebrew/opt/gnu-sed/libexec/gnubin:$PATH"'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# --- sesh: smart session manager popup (replaces tmux-session-wizard) ---
# Bound after tpm so it wins. prefix + T opens a fzf popup of sessions + zoxide dirs.
bind-key T display-popup -E -w 80% -h 70% \
  "sesh connect \"\$(sesh list --icons | fzf --ansi --no-sort --prompt '⚡  ' --height 100%)\""

